<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Attendance Management System</h1>

<form action="/add" method="POST">

    <label>Employee Name</label><br>
    <input type="text" name="name" required><br><br>

    <label>Total Classes</label><br>
    <input type="number" name="total_classes" required><br><br>

    <label>Attended Classes</label><br>
    <input type="number" name="attended_classes" required><br><br>

    <button type="submit">Add Employee</button>

</form>

<hr>

<h2>Employee List</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>Name</th>
        <th>Total Classes</th>
        <th>Attended Classes</th>
        <th>Attendance %</th>
        <th>Status</th>
    </tr>

    {% for employee in employees %}
    <tr>
        <td>{{ employee.name }}</td>
        <td>{{ employee.total_classes }}</td>
        <td>{{ employee.attended_classes }}</td>
        <td>{{ employee.percentage }}%</td>
        <td>{{ employee.status }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
